---
version: "3.3"

services:
  inbox:
    build: ./
    env_file:
      - ./.env.local
    ports:
      - "3004:3004"
      - "25:2525"
    links:
      - postgres
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    volumes:
      - attachments:/app/attachments
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=inbox
      - POSTGRES_DATABASE=inbox
      - SMTP_PORT=2525

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=inbox
      - POSTGRES_DB=inbox
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local
  attachments:
    driver: local
